# 应用配置
# 配置优先级：YAML文件 > 环境变量 > 默认值

# 开发模式
# true: LLM 通信详情（请求/响应）打印到 CLI；false: 仅显示对话和情绪内容
dev_mode: true

# LLM 模型配置
chat_model: "minimax_m2_her"      # 默认对话模型
refine_model: "deepseek_reasoner"  # 记忆精炼模型

# 记忆精炼引擎配置
memory:
  refine_threshold_tokens: 4000
  refine_max_turns: 20
  extraction_interval: 10
  max_memories_per_extraction: 5
  memory_priority_threshold: 5
  max_session_memories: 20
  max_world_memories: 50
  balance_strategy:
    keep_recent_turns: 10
    keep_system: true
    compress_middle: true
