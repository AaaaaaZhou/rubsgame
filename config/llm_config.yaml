# LLM 模型配置
# 支持多个模型配置，每个模型可以有不同的 API 密钥、基础URL等参数
# 配置优先级：YAML文件 > 环境变量 > 默认值
# 环境变量覆盖格式：LLM_{MODEL_NAME}_{KEY}，例如 LLM_DEEPSEEK_V32_API_KEY
#
# 重要提示：
# 1. 模型名称和 base_url 请参考各平台官方文档确认
# 2. max_tokens 设置为输出 token 上限，需确保不超过模型实际限制
# 3. API 密钥等敏感信息建议通过环境变量设置，避免提交到版本库

models:
  # DeepSeek V3.2 (128K 上下文，高性能推理模型)
  # API 文档: https://api-docs.deepseek.com
  # DeepSeek Reasoner (思考模式，适用于复杂推理)
  deepseek_reasoner:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-reasoner"
    temperature: 0.7
    max_tokens: 8192
    structured_output: false

  # 本地 Ollama 模型 (Llama 3.2)
  # API 兼容 OpenAI 格式
  llama3.2:
    api_key: ""
    base_url: "http://localhost:11434/v1"
    model: "llama3.2"
    temperature: 0.8
    max_tokens: 8192
    structured_output: false

  # MiniMax M2.7 (高性能文本模型，Agent 场景)
  # API 文档: https://platform.minimaxi.com/docs/api-reference/text-chat
  # 注意: max_tokens 上限为 2048
  minimax_m2.7:
    api_key: ""
    base_url: "https://api.minimaxi.com"
    model: "M2.7"
    temperature: 1.0
    max_tokens: 2048
    structured_output: true

  # MiniMax M2-her (多角色沉浸扮演，长轮次对话)
  # 注意: max_tokens 上限为 2048
  minimax_m2_her:
    api_key: ""
    base_url: "https://api.minimaxi.com"
    model: "M2-her"
    temperature: 1.0
    max_tokens: 2048
    structured_output: true

# 默认模型配置
default_model: "deepseek_reasoner"
