# LLM 模型配置
# 支持多个模型配置，每个模型可以有不同的 API 密钥、基础URL等参数
# 配置优先级：YAML文件 > 环境变量 > 默认值
# 环境变量覆盖格式：LLM_{MODEL_NAME}_{KEY}，例如 LLM_DEEPSEEK_API_KEY
#
# 重要提示：
# 1. 模型名称和 base_url 请参考各平台官方文档确认
# 2. max_tokens 设置为输出 token 上限，需确保不超过模型实际限制
# 3. API 密钥等敏感信息建议通过环境变量设置，避免提交到版本库
#
# 模型差异配置说明：
# - provider: 客户端类型，目前支持 "openai_like"
# - max_tokens_param: 输出 token 参数名，DeepSeek 用 "max_tokens"，MiniMax 用 "max_completion_tokens"
# - supports_response_format: 是否支持结构化输出
# - response_format: 结构化输出配置，DeepSeek 用 {"type": "json_object"}，MiniMax 用 {"type": "json_object"}
# - top_p: 采样参数，部分模型需要（如 MiniMax M2-her）
# - extra_roles: 支持的特殊 role 类型（如 user_system, group 等，用于角色扮演）

models:
  # DeepSeek Reasoner (思考模式，适用于复杂推理)
  # API 文档: https://api-docs.deepseek.com
  deepseek_reasoner:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-reasoner"
    temperature: 0.7
    max_tokens: 8192
    provider: "openai_like"
    max_tokens_param: "max_tokens"
    supports_response_format: true
    response_format:
      type: "json_object"

  # 本地 Ollama 模型
  # API 兼容 OpenAI 格式
  llama3.2:
    api_key: ""
    base_url: "http://localhost:11434/v1"
    model: "llama3.2"
    temperature: 0.8
    max_tokens: 8192
    provider: "openai_like"
    max_tokens_param: "max_tokens"
    supports_response_format: false

  # MiniMax M2.7 (高性能文本模型，Agent 场景)
  # API 文档: https://platform.minimaxi.com/docs/api-reference/text-chat
  minimax_m2.7:
    api_key: ""
    base_url: "https://api.minimaxi.com/v1"
    model: "M2.7"
    temperature: 1.0
    max_tokens: 2048
    provider: "openai_like"
    max_tokens_param: "max_completion_tokens"
    supports_response_format: true
    response_format:
      type: "json_object"

  # MiniMax M2-her (多角色沉浸扮演，长轮次对话)
  # API 文档: https://platform.minimaxi.com/docs/api-reference/text-chat
  minimax_m2_her:
    api_key: ""
    base_url: "https://api.minimaxi.com/v1"
    model: "M2-her"
    temperature: 1.0
    top_p: 0.95
    max_tokens: 2048
    provider: "openai_like"
    max_tokens_param: "max_completion_tokens"
    supports_response_format: true
    response_format:
      type: "json_object"
    extra_roles:
      - "user_system"
      - "group"
      - "sample_message_user"
      - "sample_message_ai"
