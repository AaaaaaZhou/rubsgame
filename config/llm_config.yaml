# LLM 模型配置
# 支持多个模型配置，每个模型可以有不同的 API 密钥、基础URL等参数
# 环境变量可以覆盖配置值，格式：LLM_{MODEL_NAME}_{KEY}，例如 LLM_GPT4O_MINI_API_KEY
#
# 重要提示：
# 1. 模型名称和base_url请参考各平台官方文档确认
# 2. max_tokens 设置为输出token限制，需确保不超过模型上下文窗口
# 3. 对话引擎场景下，max_tokens 可设置较慷慨的值以支持长回复
# 4. API密钥等敏感信息建议通过环境变量设置，避免提交到版本库

models:
  # DeepSeek Reasoner (128K上下文，高性能推理模型)
  deepseek_v32:
    api_key: ""
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-reasoner"  # 官方模型名称：deepseek-reasoner
    temperature: 0.7
    max_tokens: 80000  # 128K上下文，设置为80K输出限制，适合长对话
    structured_output: true

  # 本地 Ollama 模型 (Llama 3.2, 通常支持8K-16K上下文)
  llama3.2:
    api_key: ""  # Ollama 通常不需要 API 密钥
    base_url: "http://localhost:11434/v1"  # Ollama OpenAI兼容端点
    model: "llama3.2"  # 模型名称，可改为 "llama3.2:latest" 等
    temperature: 0.8
    max_tokens: 12000  # 12K输出限制，适合长对话
    structured_output: false

  # Minimax M2.7 模型 (高性能文本模型，具体模型名称请参考官方文档)
  minimax-m2.7:
    api_key: ""
    base_url: "https://api.minimax.chat/v1"
    model: "m2.7"  # 实际模型名称可能需要调整为 "abab6.5s-chat" 等，请参考官方文档
    temperature: 0.7
    max_tokens: 12000  # 12K输出限制，适合长对话
    structured_output: true

  # Minimax M2-Her 模型（多角色沉浸扮演，长上下文支持）
  minimax-m2-her:
    api_key: ""
    base_url: "https://api.minimax.chat/v1"
    model: "m2-her"  # 实际模型名称可能需要调整为 "abab6.5-her" 等，请参考官方文档
    temperature: 0.7
    max_tokens: 64000  # 64K输出限制，适合多角色长对话和复杂场景
    structured_output: true

# 默认模型配置（当未指定模型时使用）
default_model: "deepseek_v32"