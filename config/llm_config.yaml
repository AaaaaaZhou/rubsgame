# LLM 模型配置
# 支持多个模型配置，每个模型可以有不同的 API 密钥、基础URL等参数
# 环境变量可以覆盖配置值，格式：LLM_{MODEL_NAME}_{KEY}，例如 LLM_GPT4O_MINI_API_KEY

models:
  # deepseek
  deepseek_v32:
    api_key: ""
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-reasoner"
    temperature: 0.7
    max_tokens: 128
    structured_output: true
  
  # OpenAI GPT-4o-mini (默认模型)
  gpt-4o-mini:
    api_key: ""
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"
    temperature: 0.7
    max_tokens: 1024
    structured_output: true
  
  # OpenAI GPT-4 Turbo
  gpt-4-turbo:
    api_key: ""
    base_url: "https://api.openai.com/v1"
    model: "gpt-4-turbo"
    temperature: 0.8
    max_tokens: 2048
    structured_output: true
  
  # Anthropic Claude 3 Haiku
  claude-3-haiku:
    api_key: ""
    base_url: "https://api.anthropic.com/v1"
    model: "claude-3-haiku-20240307"
    temperature: 0.5
    max_tokens: 4096
    structured_output: false
  
  # 本地 Ollama 模型
  llama3.2:
    api_key: ""
    base_url: "http://localhost:11434/v1"
    model: "llama3.2"
    temperature: 0.8
    max_tokens: 4096
    structured_output: false

# 默认模型配置（当未指定模型时使用）
default_model: "deepseek_v32"